name: Generar Ejecutable Windows

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install flask pillow pyinstaller

    - name: Crear carpetas de recursos si faltan
      run: |
        if (!(Test-Path templates)) { New-Item -ItemType Directory -Path templates }
        if (!(Test-Path static)) { New-Item -ItemType Directory -Path static }
        if (!(Test-Path static/webp_optimizados)) { New-Item -ItemType Directory -Path static/webp_optimizados }

    - name: Crear el ejecutable con PyInstaller
      run: pyinstaller --noconfirm --onefile --windowed --add-data "templates;templates" --add-data "static;static" --name "ConvertidorWebP" app.py

    - name: Subir el .exe como artefacto
      uses: actions/upload-artifact@v4
      with:
        name: ConvertidorWebP-Windows
        path: dist/ConvertidorWebP.exe
